syntax = "proto3";

package fletcher.v1;

option go_package = "github.com/joshjon/fletcher/internal/gen/proto/fletcher/v1;fletcherv1";

// SessionService manages durable, interactive sessions: a session is a
// persistent microVM whose fork (its disk) survives stop/start, unlike an
// ephemeral job. It shares the runtime and snapshot machinery with jobs (one
// execution engine, DESIGN.md §4) but has its own start/stop/exec lifecycle.
service SessionService {
  // CreateSession provisions a session's persistent fork and boots its VM. The
  // returned session has state RUNNING.
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse) {}
  // GetSession fetches a session by ID or name.
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {}
  // ListSessions returns all sessions, newest first.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse) {}
  // StartSession boots a stopped session's VM against its persisted fork.
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse) {}
  // StopSession stops a running session's VM, keeping its fork on disk.
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse) {}
  // DeleteSession stops the VM (if running) and destroys the fork.
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse) {}
  // UpdateSession changes a session's egress policy and/or gateway. Both are
  // applied to the fork at VM boot, so a change to a running session takes
  // effect on its next start (restart_required reports that).
  rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse) {}
  // ExecSession runs a command inside a running session and returns its
  // captured output and exit code.
  rpc ExecSession(ExecSessionRequest) returns (ExecSessionResponse) {}
  // ShellSession opens an interactive PTY in a running session. The first
  // client message must carry a ShellStart; later messages carry stdin bytes
  // or window-resize events. Server messages carry terminal output, then a
  // final exit code when the shell ends. Full-duplex: requires HTTP/2.
  rpc ShellSession(stream ShellSessionRequest) returns (stream ShellSessionResponse) {}
  // ProxySession brokers a raw byte stream into a running session VM's SSH
  // server: the daemon relays it over vsock (the VM stays unroutable). It
  // backs `fletcher session ssh` as an SSH ProxyCommand. The first client
  // message must carry a ProxyOpen; all later messages (both directions) are
  // opaque bytes. Full-duplex: requires HTTP/2.
  rpc ProxySession(stream ProxySessionRequest) returns (stream ProxySessionResponse) {}
  // PublishPort exposes a port the session serves, brokered by the daemon so
  // the VM stays unroutable. The returned port is reachable over the tunnel at
  // its tunnel_port.
  rpc PublishPort(PublishPortRequest) returns (PublishPortResponse) {}
  // UnpublishPort stops forwarding a session's published port.
  rpc UnpublishPort(UnpublishPortRequest) returns (UnpublishPortResponse) {}
  // ListPorts returns a session's published ports.
  rpc ListPorts(ListPortsRequest) returns (ListPortsResponse) {}
  // RestartSession stops a running session's VM and starts it again against the
  // same fork. For a run_app (deploy) session this re-runs the image's app.
  rpc RestartSession(RestartSessionRequest) returns (RestartSessionResponse) {}
  // RedeploySession replaces a session's disk with a fresh fork of its current
  // template image and restarts it (a clean redeploy, vs RestartSession which
  // keeps the same disk). For a registry-sourced image it first attempts a
  // best-effort re-pull to the latest; a local image is re-forked as-is.
  rpc RedeploySession(RedeploySessionRequest) returns (RedeploySessionResponse) {}
  // GetSessionLogs returns the tail of a run_app session's app log
  // (/var/log/fletcher-app.log), captured from the running VM.
  rpc GetSessionLogs(GetSessionLogsRequest) returns (GetSessionLogsResponse) {}
  // StreamSessionLogs streams a run_app session's app log; with follow set it
  // keeps streaming new lines (like `tail -f`) until the client disconnects.
  // Server-streaming, so it needs HTTP/2 (the same NIOHTTPClient path the shell
  // uses on iOS).
  rpc StreamSessionLogs(StreamSessionLogsRequest) returns (stream StreamSessionLogsResponse) {}
  // CommitSessionImage commits a session's fork as a new image template (the
  // docker-commit analogue), so jobs, sessions, and deploys can boot from it.
  // A running session's disk is synced first; the result is at worst
  // crash-consistent. Requires a snapshot driver that can commit (ext4).
  rpc CommitSessionImage(CommitSessionImageRequest) returns (CommitSessionImageResponse) {}
  // RollbackSession swaps a session back to the fork its last redeploy
  // retired and restarts it - the one-step undo for a bad redeploy. Rolling
  // forward again is the same call (the forks swap each time).
  rpc RollbackSession(RollbackSessionRequest) returns (RollbackSessionResponse) {}
  // UploadFile streams a file from the client into a running session's fork. The
  // first client message must carry an UploadStart (ref + path + mode); later
  // messages carry chunk bytes. The daemon relays them over vsock to the guest,
  // which writes the file atomically and chowns it to the login user. The VM
  // stays unroutable - the bytes ride the daemon control channel, not a route
  // into the VM. Client-streaming: requires HTTP/2.
  rpc UploadFile(stream UploadFileRequest) returns (UploadFileResponse) {}
  // DownloadFile streams a file out of a running session's fork to the client.
  // The first response message carries a FileInfo (size + mode); later messages
  // carry chunk bytes. Server-streaming: requires HTTP/2.
  rpc DownloadFile(DownloadFileRequest) returns (stream DownloadFileResponse) {}
  // ListDir lists a directory inside a running session's fork. Served by the
  // guest init in pure Go (no shell), so it works on any image - including a
  // distroless one with no /bin/sh, where exec/shell are unavailable.
  rpc ListDir(ListDirRequest) returns (ListDirResponse) {}
  // FileOp performs a delete, move (rename), or copy inside a running session's
  // fork. Like the other file RPCs it is served by the guest init in pure Go, so
  // it works on a shell-less image.
  rpc FileOp(FileOpRequest) returns (FileOpResponse) {}
}

enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_RUNNING = 1;
  SESSION_STATE_STOPPED = 2;
}

message Session {
  string id = 1;
  string name = 2;
  string image = 3;
  SessionState state = 4;
  // Unix epoch seconds.
  int64 created_at = 5;
  int64 updated_at = 6;
  optional int64 last_used_at = 7;
  // disk_bytes is the session fork's on-disk size.
  int64 disk_bytes = 8;
  // egress_policy gates the fork's outbound network via the daemon proxy:
  // "none" (no egress), "allowlist" (curated hosts), or "open" (any public
  // host; the LAN guard still applies). DESIGN.md §5.
  string egress_policy = 9;
  // gateway is "on" or "off": whether the daemon's model-gateway env
  // (ANTHROPIC_/OPENAI_ base-URL + key) is injected. "off" lets an agent use
  // its own auth (e.g. a subscription OAuth login) instead. DESIGN.md §6.
  string gateway = 10;
  // run_app is whether the session runs the image's own app (its captured
  // entrypoint) on boot, rather than coming up as a bare environment. M9.
  bool run_app = 11;
  // deploy carries the image-derived detail for a run_app (deploy) session.
  // Populated only by GetSession (not ListSessions), and only when run_app is
  // true and the image's template metadata is available.
  DeployInfo deploy = 12;
  // has_rollback is whether a redeploy retired a fork this session can roll
  // back to (RollbackSession).
  bool has_rollback = 13;
  // volume is the name of the persistent volume attached to this session
  // (mounted at /volume in the guest), empty when none.
  string volume = 14;
  // env_vars are the user-set environment variables injected into the session's
  // app/process at boot. Populated by GetSession. A secret var carries only its
  // name and secret_name (never the secret's value).
  repeated EnvVar env_vars = 15;
}

// EnvVar is one user-set environment variable injected into a session's
// app/process. Exactly one source is set: value for a plain literal, or
// secret_name to reference a stored secret (SecretService) resolved at boot.
// A secret's value is never carried in responses - only its name.
message EnvVar {
  // name is the environment variable name (a valid shell identifier). Names the
  // daemon owns (e.g. HTTP_PROXY, FLETCHER_*, and the gateway's keys) are
  // reserved and rejected.
  string name = 1;
  // value is the literal value for a plain variable. Empty for a secret.
  string value = 2;
  // secret_name references a stored secret by name (SecretService). When set,
  // the variable is secret and value is ignored on input / omitted on output.
  string secret_name = 3;
}

// DeployInfo is the image-derived detail shown on a deploy's detail screen.
message DeployInfo {
  // entrypoint is the image's effective launch command (ENTRYPOINT + CMD).
  repeated string entrypoint = 1;
  // exposed_port is the image's lowest EXPOSE port (0 when it declares none).
  uint32 exposed_port = 2;
  // restart_count is how many times the in-guest supervisor has restarted the
  // app. Reported once the guest exposes it; 0 until then.
  uint32 restart_count = 3;
}

message CreateSessionRequest {
  string name = 1;
  string image = 2;
  // gateway is "on" | "off"; empty uses the daemon's default_gateway setting.
  string gateway = 4;
  // egress_policy is "none" | "allowlist" | "open"; empty uses the daemon's
  // default_egress_policy setting.
  string egress_policy = 3;
  // run_app makes the session run the image's own app (its entrypoint) on boot.
  bool run_app = 5;
  // volume attaches the named persistent volume (an ID or name), mounted at
  // /volume in the guest for the session's lifetime. Empty attaches none.
  string volume = 6;
  // credentials seeds the box's saved agent logins (e.g. "claude") into the new
  // session's fork so it boots already authenticated. Empty uses the daemon's
  // default_credential setting (which may also be empty, for no login).
  repeated string credentials = 7;
  // env_vars are user-set environment variables injected into the session's
  // app/process at boot (plain values, or references to stored secrets).
  repeated EnvVar env_vars = 8;
}

message CreateSessionResponse {
  Session session = 1;
}

message GetSessionRequest {
  // ref is a session ID or name.
  string ref = 1;
}

message GetSessionResponse {
  Session session = 1;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message StartSessionRequest {
  string ref = 1;
}

message StartSessionResponse {
  Session session = 1;
}

message StopSessionRequest {
  string ref = 1;
}

message StopSessionResponse {
  Session session = 1;
}

message DeleteSessionRequest {
  string ref = 1;
}

message DeleteSessionResponse {
  bool deleted = 1;
}

message UpdateSessionRequest {
  // ref is a session ID or name.
  string ref = 1;
  // egress_policy is "none" | "allowlist" | "open"; empty leaves it unchanged.
  string egress_policy = 2;
  // gateway is "on" | "off"; empty leaves it unchanged.
  string gateway = 3;
  // env_vars replaces the session's user-set environment variables when
  // update_env_vars is true (an empty list then clears them). Ignored when
  // update_env_vars is false, so an egress/gateway-only update leaves env alone.
  repeated EnvVar env_vars = 4;
  // update_env_vars selects whether env_vars is applied (it disambiguates "leave
  // env unchanged" from "set env to empty"). Applied at the next VM boot, like
  // egress_policy/gateway (restart_required reports that).
  bool update_env_vars = 5;
}

message UpdateSessionResponse {
  Session session = 1;
  // restart_required is true when the session is running, so the change only
  // takes effect after a restart.
  bool restart_required = 2;
}

message ExecSessionRequest {
  string ref = 1;
  string command = 2;
}

message ExecSessionResponse {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
}

message RestartSessionRequest {
  // ref is a session ID or name.
  string ref = 1;
}

message RestartSessionResponse {
  Session session = 1;
}

message RedeploySessionRequest {
  // ref is a session ID or name.
  string ref = 1;
  // image retargets the session before the re-fork: the name of an imported
  // template, or a registry ref (e.g. ghcr.io/you/app:v2) the daemon imports
  // under the session's current template name first. Empty redeploys the
  // session's current image (with the best-effort same-ref re-pull).
  string image = 2;
}

message RedeploySessionResponse {
  Session session = 1;
  // image_refreshed is true when a registry re-pull updated the template before
  // the re-fork; false for a local image, or when the pull was skipped or could
  // not run (e.g. the image is private and needs credentials).
  bool image_refreshed = 2;
}

message CommitSessionImageRequest {
  // ref is a session ID or name.
  string ref = 1;
  // name is the template name for the committed image (lowercase letters,
  // digits, '.', '_', '-').
  string name = 2;
  // entrypoint, with cmd appended, is the command a deploy of the committed
  // image runs. Setting either requires the session to be running (the spec is
  // written inside the guest before the commit). Empty keeps the image's
  // existing app spec.
  repeated string entrypoint = 3;
  repeated string cmd = 4;
  // working_dir is the directory the deploy's app starts in.
  string working_dir = 5;
  // exposed_port is the port a deploy of the image publishes by default
  // (0 keeps the source template's, if known).
  uint32 exposed_port = 6;
  // force replaces an existing template of the same name.
  bool force = 7;
}

message CommitSessionImageResponse {
  // image is the committed template name.
  string image = 1;
}

message RollbackSessionRequest {
  // ref is a session ID or name.
  string ref = 1;
}

message RollbackSessionResponse {
  Session session = 1;
}

message GetSessionLogsRequest {
  // ref is a session ID or name.
  string ref = 1;
  // tail_lines caps how many trailing lines to return; 0 uses a default.
  uint32 tail_lines = 2;
}

message GetSessionLogsResponse {
  // content is the captured tail of the app log.
  string content = 1;
}

message StreamSessionLogsRequest {
  // ref is a session ID or name.
  string ref = 1;
  // tail_lines is how many trailing lines to send before live output; 0 uses a
  // default.
  uint32 tail_lines = 2;
  // follow keeps the stream open and sends new lines as they are written, like
  // `tail -f`, until the client disconnects.
  bool follow = 3;
}

message StreamSessionLogsResponse {
  // data is raw bytes from the app log.
  bytes data = 1;
}

message ShellSessionRequest {
  oneof msg {
    // start opens the PTY; must be the first message on the stream.
    ShellStart start = 1;
    // stdin carries keystrokes typed at the terminal.
    bytes stdin = 2;
    // resize reports a new terminal window size.
    ShellResize resize = 3;
  }
}

message ShellStart {
  // ref is a session ID or name; the session must be running.
  string ref = 1;
  // term is the client's TERM (e.g. xterm-256color), set inside the PTY.
  string term = 2;
  // cols and rows are the initial window size.
  uint32 cols = 3;
  uint32 rows = 4;
  // control_mode opts the durable shell into tmux control mode (tmux -CC): the
  // stream then carries the tmux control protocol (%output, %begin/%end, ...)
  // instead of a rendered terminal, so a client that speaks it renders panes
  // natively with its own scrollback (native scroll, no copy-mode) while
  // keeping tmux durability. A plain client leaves this false and gets the
  // rendered-terminal stream as before.
  bool control_mode = 5;
}

message ShellResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message ShellSessionResponse {
  oneof msg {
    // data is raw terminal output (stdout and stderr merged by the PTY).
    bytes data = 1;
    // exit_code is the shell's exit status; the final message on the stream.
    int32 exit_code = 2;
  }
}

message ProxySessionRequest {
  oneof msg {
    // open names the session to broker into; must be the first message.
    ProxyOpen open = 1;
    // data is opaque bytes from the client to the session's SSH server.
    bytes data = 2;
  }
}

message ProxyOpen {
  // ref is a session ID or name; the session must be running.
  string ref = 1;
}

message ProxySessionResponse {
  // data is opaque bytes from the session's SSH server back to the client.
  bytes data = 1;
}

message UploadFileRequest {
  oneof msg {
    // start opens the transfer; must be the first message on the stream.
    UploadStart start = 1;
    // chunk carries a slice of the file's bytes, in order.
    bytes chunk = 2;
  }
}

message UploadStart {
  // ref is a session ID or name; the session must be running.
  string ref = 1;
  // path is the destination inside the guest. An absolute path is used as-is; a
  // relative path resolves under the login user's home.
  string path = 2;
  // mode is the destination file's unix permission bits (0 uses 0644). The
  // execute bit is honoured, so an uploaded binary can be made runnable.
  uint32 mode = 3;
  // size is the file's total length in bytes. The client declares it up front
  // (it knows the source size) so the daemon streams exactly this many bytes to
  // the guest; a short or long stream is reported as an error.
  int64 size = 4;
  // overwrite controls what happens when a file already exists at path: false
  // (the default) fails with an "already exists" error before any bytes stream;
  // true replaces it. A directory at path always fails (it is never replaced).
  bool overwrite = 5;
}

message UploadFileResponse {
  // bytes_written is the number of bytes landed in the file.
  int64 bytes_written = 1;
  // sha256 is the hex SHA-256 of the written file, so the client can verify
  // integrity end to end.
  string sha256 = 2;
}

message DownloadFileRequest {
  // ref is a session ID or name; the session must be running.
  string ref = 1;
  // path is the source inside the guest. Absolute is used as-is; relative
  // resolves under the login user's home.
  string path = 2;
}

message DownloadFileResponse {
  oneof msg {
    // info is the file's size and mode; the first message on the stream.
    FileInfo info = 1;
    // chunk carries a slice of the file's bytes, in order.
    bytes chunk = 2;
  }
}

message FileInfo {
  // size is the file's total length in bytes.
  int64 size = 1;
  // mode is the file's unix permission bits.
  uint32 mode = 2;
}

message ListDirRequest {
  // ref is a session ID or name; the session must be running.
  string ref = 1;
  // path is the directory to list. Absolute is used as-is; empty or relative
  // resolves under the login user's home.
  string path = 2;
}

message ListDirResponse {
  // path is the resolved absolute directory that was listed.
  string path = 1;
  // entries are the directory's contents (directories first, then by name).
  repeated DirEntry entries = 2;
  // truncated is true when the directory had more entries than the listing cap
  // and some were omitted.
  bool truncated = 3;
}

enum FileOpKind {
  FILE_OP_KIND_UNSPECIFIED = 0;
  FILE_OP_KIND_DELETE = 1;
  FILE_OP_KIND_MOVE = 2;
  FILE_OP_KIND_COPY = 3;
}

message FileOpRequest {
  // ref is a session ID or name; the session must be running.
  string ref = 1;
  // op is the operation to perform.
  FileOpKind op = 2;
  // path is the source (move/copy) or target (delete). Absolute is used as-is; a
  // relative path resolves under the login user's home.
  string path = 3;
  // dest is the destination for a move or copy. If it names an existing
  // directory, the source's base name is placed inside it.
  string dest = 4;
  // recursive allows deleting or copying a directory and its contents.
  bool recursive = 5;
}

message FileOpResponse {}

message DirEntry {
  // name is the entry's base name (no path).
  string name = 1;
  // size is the file size in bytes (0 for a directory).
  int64 size = 2;
  // mode is the entry's unix permission bits.
  uint32 mode = 3;
  // is_dir is whether the entry is a directory (a symlink to a directory counts).
  bool is_dir = 4;
  // modified_at is the entry's mtime as Unix epoch seconds.
  int64 modified_at = 5;
  // is_symlink is whether the entry itself is a symbolic link.
  bool is_symlink = 6;
  // symlink_target is where a symlink points (best-effort; empty otherwise).
  string symlink_target = 7;
}

// PublishedPort is a port a session serves, brokered by the daemon (the
// preview-proxy pattern, for an arbitrary port). It is reachable over the
// WireGuard tunnel at tunnel_port; public/host drive public exposure.
message PublishedPort {
  string id = 1;
  string session_id = 2;
  // guest_port is the TCP port the service listens on inside the VM.
  uint32 guest_port = 3;
  // name is a human label (defaults to "port-<guest_port>").
  string name = 4;
  // tunnel_port is the host-side TCP port (on the tunnel IP) the daemon
  // forwards to guest_port; 0 when no tunnel is up to bind it.
  uint32 tunnel_port = 5;
  // public is whether the port is exposed on the public listener (Phase 2).
  bool public = 6;
  // host is the public hostname routed to this port when public (Phase 2).
  string host = 7;
  // Unix epoch seconds.
  int64 created_at = 8;
  // tls_status is the public cert state for `host`: "valid", "renewing",
  // "expired", or "pending" (no cert yet - certmagic issues on the first HTTPS
  // request). Empty for a tunnel-only port (no public TLS).
  string tls_status = 9;
  // tls_expires_at is the public cert's NotAfter as Unix epoch seconds, so a
  // client can show "valid for N days" / "renews soon". 0 when there is no cert.
  int64 tls_expires_at = 10;
}

message PublishPortRequest {
  // ref is a session ID or name.
  string ref = 1;
  // guest_port is the TCP port the service listens on inside the VM.
  uint32 guest_port = 2;
  // name is an optional label; empty defaults to "port-<guest_port>".
  string name = 3;
  // public also serves the port on the public HTTPS listener (requires the
  // public_web setting enabled). When false the port is tunnel-only.
  bool public = 4;
  // host is the public hostname to route to this port (required when public).
  string host = 5;
}

message PublishPortResponse {
  PublishedPort port = 1;
  // public_ip is the daemon's discovered public IP (host of the public
  // endpoint), so the client can tell the operator the exact A record to create
  // for a --public port. Empty if no public endpoint is known.
  string public_ip = 2;
}

message UnpublishPortRequest {
  string ref = 1;
  uint32 guest_port = 2;
}

message UnpublishPortResponse {}

message ListPortsRequest {
  string ref = 1;
}

message ListPortsResponse {
  repeated PublishedPort ports = 1;
  // public_ip is the daemon's discovered public IP, so the client can show
  // whether each public port's hostname resolves to this box yet.
  string public_ip = 2;
}
