syntax = "proto3";

package fletcher.v1;

option go_package = "github.com/joshjon/fletcher/internal/gen/proto/fletcher/v1;fletcherv1";

// PeerService manages WireGuard peers and emits the wg-quick configs
// operators install on either side of the tunnel. Private keys are
// returned to the client exactly once at creation time - the daemon
// retains only the public half.
service PeerService {
  // PairPeer is the one-line peer-onboarding path. The daemon auto-
  // allocates a tunnel IP from its configured subnet and uses its
  // stored public_endpoint; the caller supplies only a name. Returns
  // a fully-rendered client wg-quick config ready to drop on the
  // device. Fails clearly if the daemon has no public_endpoint set.
  rpc PairPeer(PairPeerRequest) returns (PairPeerResponse) {}
  // BeginPair starts a client-keygen pairing flow used by native
  // clients (iOS) that generate their own WireGuard keypair locally.
  // The daemon allocates a tunnel address, mints a short-lived
  // pairing code, and returns the server-side material the client
  // needs to assemble its own wg-quick config. No peer row is
  // committed until CompletePair is called with the client public
  // key; the slot expires if the code is not redeemed in time.
  rpc BeginPair(BeginPairRequest) returns (BeginPairResponse) {}
  // CompletePair finishes a client-keygen pairing flow. The caller
  // supplies the pairing code from BeginPair plus the WireGuard
  // public key it generated locally; the daemon registers the peer
  // and returns the per-peer API token. The private half of the
  // keypair never leaves the client.
  rpc CompletePair(CompletePairRequest) returns (CompletePairResponse) {}
  // CreatePeer is the power-user path: the caller supplies the
  // tunnel address and server endpoint explicitly. Use PairPeer for
  // the common case.
  rpc CreatePeer(CreatePeerRequest) returns (CreatePeerResponse) {}
  rpc GetPeer(GetPeerRequest) returns (GetPeerResponse) {}
  rpc ListPeers(ListPeersRequest) returns (ListPeersResponse) {}
  rpc DeletePeer(DeletePeerRequest) returns (DeletePeerResponse) {}
  // ServerConfig renders the wg-quick config for the daemon-side
  // WireGuard interface, including every registered peer.
  rpc ServerConfig(ServerConfigRequest) returns (ServerConfigResponse) {}
}

message Peer {
  string id = 1;
  string name = 2;
  string public_key = 3;
  repeated string allowed_ips = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message CreatePeerRequest {
  string name = 1;
  repeated string allowed_ips = 2;
  // Optional render fields: when present, the response includes a
  // wg-quick config ready to drop on the client device.
  string client_address = 3;       // e.g. "10.99.0.2/32"
  repeated string client_dns = 4;
  string server_endpoint = 5;      // host:port
  string server_public_key = 6;    // override; daemon supplies if empty
  repeated string client_allowed_ips = 7;
}
message CreatePeerResponse {
  Peer peer = 1;
  // ClientConfig is the wg-quick body. Empty when client_address was not
  // supplied; in that case the caller can call ServerConfig later to
  // render with full context.
  string client_config = 2;
  // PrivateKey is the peer's WireGuard private key, returned exactly
  // once. Callers must hand it to the client device immediately and not
  // log it.
  string private_key = 3;
}

message GetPeerRequest { string id = 1; }
message GetPeerResponse { Peer peer = 1; }

message ListPeersRequest {
  int32 limit = 1;
  int32 offset = 2;
}
message ListPeersResponse { repeated Peer peers = 1; }

message DeletePeerRequest { string id = 1; }
message DeletePeerResponse { bool existed = 1; }

message PairPeerRequest {
  // name is the only required input; everything else is daemon-resolved.
  string name = 1;
}

message BeginPairRequest {
  // name is the only required input; everything else is daemon-resolved.
  string name = 1;
}
message BeginPairResponse {
  // pairing_code is the short-lived, one-time-use string the client
  // returns in CompletePair to claim this pairing slot.
  string pairing_code = 1;
  // expires_at is the unix-seconds deadline after which the pairing
  // code is rejected and the allocated address is released.
  int64 expires_at = 2;
  // server_public_key is the daemon's WireGuard public key, base64.
  string server_public_key = 3;
  // endpoint is the host:port the client's WireGuard interface dials
  // (copied from the daemon's configured public_endpoint).
  string endpoint = 4;
  // address is the tunnel /32 the daemon reserved for this peer; the
  // client uses it as its WireGuard interface address.
  string address = 5;
  // allowed_ips are the CIDRs the client should route through the
  // tunnel (typically the daemon's tunnel CIDR, e.g. "10.99.0.0/24").
  repeated string allowed_ips = 6;
  // api_endpoint is the tunnel-side host:port a client dials to drive
  // the daemon's network API once the tunnel is up.
  string api_endpoint = 7;
  // persistent_keepalive is the WireGuard keepalive interval in
  // seconds the client should configure. 0 disables.
  int32 persistent_keepalive = 8;
}

message CompletePairRequest {
  // pairing_code is the value returned by BeginPair. One-time use;
  // the daemon rejects a second call with the same code.
  string pairing_code = 1;
  // name must match the BeginPair request that issued the code. The
  // duplicate is a typo guard, not an auth factor.
  string name = 2;
  // client_public_key is the base64-encoded Curve25519 public key the
  // client generated locally; the daemon stores it as the peer's
  // public half.
  string client_public_key = 3;
}
message CompletePairResponse {
  Peer peer = 1;
  // api_token is the per-peer bearer token for the daemon's network
  // API, returned exactly once. Clients send it as
  // `Authorization: Bearer <token>` when driving the daemon.
  string api_token = 2;
  // api_endpoint is the tunnel-side host:port the client dials to
  // drive the daemon's network API; echoed here for clients that
  // only persist the CompletePair response.
  string api_endpoint = 3;
}

message PairPeerResponse {
  Peer peer = 1;
  // client_config is the rendered wg-quick body, ready to drop on the
  // peer device or scan as a QR code.
  string client_config = 2;
  // private_key is the peer's WireGuard private key, returned exactly
  // once. Callers must hand it to the client device immediately and not
  // log it.
  string private_key = 3;
  // address is the tunnel /32 the daemon allocated for this peer.
  string address = 4;
  // endpoint is the host:port the peer's device will dial; copied from
  // the daemon's configured public_endpoint.
  string endpoint = 5;
  // api_token is the per-peer bearer token for the daemon's network API,
  // returned exactly once. Clients send it as `Authorization: Bearer <token>`
  // when driving the daemon over the tunnel.
  string api_token = 6;
  // api_endpoint is the tunnel-side host:port a client dials to drive the
  // daemon (e.g. "10.99.0.1:11700"), reachable once the tunnel is up.
  string api_endpoint = 7;
}

message ServerConfigRequest {
  string address = 1;      // e.g. "10.99.0.1/24"
  int32 listen_port = 2;   // e.g. 51820
}
message ServerConfigResponse {
  // Config is the rendered wg-quick body, with the daemon's server
  // private key interpolated in.
  string config = 1;
  // PublicKey is the daemon's server public key (safe to share).
  string public_key = 2;
}
