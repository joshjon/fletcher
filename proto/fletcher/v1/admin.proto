syntax = "proto3";

package fletcher.v1;

option go_package = "github.com/joshjon/fletcher/internal/gen/proto/fletcher/v1;fletcherv1";

// AdminService is the daemon's administrative surface - health checks and
// basic runtime inspection. Available on the local Unix socket only.
service AdminService {
  // Health returns the daemon's liveness state.
  rpc Health(HealthRequest) returns (HealthResponse) {}
}

message HealthRequest {}

message HealthResponse {
  // status is "ok" when the daemon is healthy.
  string status = 1;
  // version of the running daemon.
  string version = 2;
  // commit of the running daemon's build.
  string commit = 3;
  // started_at is the daemon's start time as Unix epoch seconds.
  int64 started_at = 4;
  // public_endpoint is the host:port the daemon will advertise to paired
  // devices, as resolved at startup (operator-configured, or derived from
  // UPnP). Empty means peer pairing will fail until it is set. Exposed here
  // so `fletcher doctor` can catch the case where the endpoint is stale or
  // missing even though the router probe looks healthy.
  string public_endpoint = 5;
  // runtime is the effective runtime driver resolved at startup: "firecracker",
  // "runc", or "mock". Exposed so `fletcher doctor` can tell whether jobs run
  // with real isolation.
  string runtime = 6;
  // snapshot is the effective snapshot driver resolved at startup: "ext4",
  // "btrfs", or "mock".
  string snapshot = 7;
  // base_image_available is true when at least one base-image rootfs template is
  // imported for the active snapshot driver, so jobs and sessions can boot.
  bool base_image_available = 8;
  // base_image_update_available is true when the registry has a newer version of
  // the default image than the imported template (checked in the background).
  bool base_image_update_available = 9;
}
