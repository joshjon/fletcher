syntax = "proto3";

package fletcher.v1;

option go_package = "github.com/joshjon/fletcher/internal/gen/proto/fletcher/v1;fletcherv1";

// SecretService manages the daemon's encrypted credential store. Plaintext
// values never cross the wire on read paths - clients can write a new
// value and list names + metadata, but not retrieve a value back. The
// daemon decrypts only inside its own process (see DESIGN.md §6).
service SecretService {
  rpc SetSecret(SetSecretRequest) returns (SetSecretResponse) {}
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse) {}
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse) {}
}

message SetSecretRequest {
  string name = 1;
  string value = 2;
}
message SetSecretResponse {}

message DeleteSecretRequest {
  string name = 1;
}
message DeleteSecretResponse {
  bool existed = 1;
}

message ListSecretsRequest {}
message ListSecretsResponse {
  repeated SecretMetadata secrets = 1;
}

message SecretMetadata {
  string name = 1;
  int64 created_at = 2;
  int64 updated_at = 3;
}
