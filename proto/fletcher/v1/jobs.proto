syntax = "proto3";

package fletcher.v1;

option go_package = "github.com/joshjon/fletcher/internal/gen/proto/fletcher/v1;fletcherv1";

// JobService is the client API for creating and managing jobs.
service JobService {
  // CreateJob enqueues a new job. The returned job has status QUEUED.
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse) {}
  // GetJob fetches a single job by ID.
  rpc GetJob(GetJobRequest) returns (GetJobResponse) {}
  // ListJobs paginates the job table, newest first. status_filter applies an
  // optional equality filter; UNSPECIFIED returns all.
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {}
  // CancelJob transitions a queued or running job to CANCELLED. Returns
  // cancelled=false (no error) if the job was already terminal.
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse) {}
  // UpdateJobSchedule changes a cron job definition's schedule and recomputes
  // its next run. Valid only for a cron job.
  rpc UpdateJobSchedule(UpdateJobScheduleRequest) returns (UpdateJobScheduleResponse) {}
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_QUEUED = 1;
  JOB_STATUS_RUNNING = 2;
  JOB_STATUS_SUCCEEDED = 3;
  JOB_STATUS_FAILED = 4;
  JOB_STATUS_CANCELLED = 5;
  // SCHEDULED is a cron job definition resting between runs; the supervisor
  // fires it on its schedule by creating child runs.
  JOB_STATUS_SCHEDULED = 6;
}

enum JobTrigger {
  JOB_TRIGGER_UNSPECIFIED = 0;
  JOB_TRIGGER_EPHEMERAL = 1;
  JOB_TRIGGER_CRON = 2;
  JOB_TRIGGER_LONG_RUNNING = 3;
}

message Job {
  string id = 1;
  JobStatus status = 2;
  JobTrigger trigger = 3;
  string name = 4;
  string command = 5;
  string image = 6;
  // Unix epoch seconds.
  int64 created_at = 7;
  int64 updated_at = 8;
  optional int64 started_at = 9;
  optional int64 completed_at = 10;
  string error_message = 11;
  optional int32 exit_code = 12;
  // Named credential directories bind-mounted into the fork at job start
  // (DESIGN.md §5 "Credential modes", Phase 12 "trusted-credential mode").
  // Supported names: "claude", "codex", "gemini".
  repeated string credentials = 13;
  // schedule is the cron expression for a cron job (empty otherwise).
  string schedule = 14;
  // next_run_at is when a scheduled cron job next fires (Unix epoch seconds).
  optional int64 next_run_at = 15;
  // parent_id links a run spawned by a cron job back to its definition.
  optional string parent_id = 16;
  // egress_policy gates the fork's outbound network via the daemon proxy:
  // "none" | "allowlist" | "open". DESIGN.md §5.
  string egress_policy = 17;
  // gateway is "on" or "off": whether the daemon's model-gateway env is
  // injected. "off" lets the agent use its own auth. DESIGN.md §6.
  string gateway = 18;
}

message CreateJobRequest {
  JobTrigger trigger = 1;
  string name = 2;
  string command = 3;
  string image = 4;
  // Optional list of credentials to bind-mount; see Job.credentials.
  repeated string credentials = 5;
  // schedule is required when trigger is CRON: a 5-field cron expression
  // (e.g. "*/5 * * * *") or a macro (@hourly, @daily, ...).
  string schedule = 6;
  // egress_policy is "none" | "allowlist" | "open"; empty uses the daemon's
  // default_egress_policy setting.
  string egress_policy = 7;
  // gateway is "on" | "off"; empty uses the daemon's default_gateway setting.
  string gateway = 8;
}

message CreateJobResponse {
  Job job = 1;
}

message GetJobRequest {
  string id = 1;
}

message GetJobResponse {
  Job job = 1;
}

message ListJobsRequest {
  int32 limit = 1;
  int32 offset = 2;
  JobStatus status_filter = 3;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  int64 total = 2;
}

message CancelJobRequest {
  string id = 1;
}

message CancelJobResponse {
  bool cancelled = 1;
}

message UpdateJobScheduleRequest {
  // id is the cron job definition to reschedule.
  string id = 1;
  // schedule is the new cron expression (e.g. "0 7 * * *").
  string schedule = 2;
}
message UpdateJobScheduleResponse {
  Job job = 1;
}
