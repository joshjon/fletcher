syntax = "proto3";

package fletcher.v1;

option go_package = "github.com/joshjon/fletcher/internal/gen/proto/fletcher/v1;fletcherv1";

// CredentialService manages the box's saved logins. Subscription agents
// (Claude Max, ChatGPT, Gemini) authenticate via OAuth tokens on disk, which the
// model gateway cannot stamp. Save one here once and new sessions are created
// already logged in (seeded into the fork at create; see CreateSessionRequest's
// credentials field). The daemon never parses a token - it copies a named
// directory - so the same surface covers every agent, plus a vendor-neutral
// "git" login (a host + username + token) so sessions can clone private repos.
service CredentialService {
  // SaveSessionLogin copies an agent login out of a running session (where the
  // operator logged in interactively) into the box's saved logins, so future
  // sessions can be seeded with it.
  rpc SaveSessionLogin(SaveSessionLoginRequest) returns (SaveSessionLoginResponse) {}
  // SaveGitCredential saves a git host login (host + username + token, e.g. a
  // GitHub or GitLab personal access token) from structured fields - no running
  // session needed. A session seeded with the "git" credential then clones over
  // HTTPS without prompting (subject to the egress policy reaching the host).
  // Call once per host; several hosts coexist in the one "git" credential.
  rpc SaveGitCredential(SaveGitCredentialRequest) returns (SaveGitCredentialResponse) {}
  // ListCredentials returns the names of the box's saved logins.
  rpc ListCredentials(ListCredentialsRequest) returns (ListCredentialsResponse) {}
  // DeleteCredential removes a saved login.
  rpc DeleteCredential(DeleteCredentialRequest) returns (DeleteCredentialResponse) {}
}

message SaveSessionLoginRequest {
  // session_ref is the session (ID or name) to copy the login out of.
  string session_ref = 1;
  // name is the agent login to save: "claude" | "codex" | "gemini".
  string name = 2;
}

message SaveSessionLoginResponse {}

message SaveGitCredentialRequest {
  // host is the git host, e.g. "github.com" or "gitlab.com" (a bare hostname,
  // no scheme and no path).
  string host = 1;
  // username is the account/login for the host.
  string username = 2;
  // token is the password or personal access token. Stored in cleartext under
  // the box's credentials root (the operator's own metal), as the agent logins
  // are.
  string token = 3;
  // git_user_name optionally sets the committer name (git user.name). Empty
  // keeps any identity saved by a previous call.
  string git_user_name = 4;
  // git_user_email optionally sets the committer email (git user.email).
  string git_user_email = 5;
}

message SaveGitCredentialResponse {}

message ListCredentialsRequest {}

message ListCredentialsResponse {
  // names are the saved logins, e.g. ["claude"].
  repeated string names = 1;
  // supported are every agent whose login can be saved out of a running session
  // (the agents that ship in the image), e.g. ["claude", "codex", "gemini",
  // "pi"]. Clients drive their "save login from a session" picker from this so
  // it never drifts from what the image ships. The "git" login is not listed
  // here - it is saved from structured fields via SaveGitCredential, not by
  // exporting a session - but appears in names once saved.
  repeated string supported = 2;
}

message DeleteCredentialRequest {
  // name is the saved login to remove: "claude" | "codex" | "gemini" | "git".
  string name = 1;
}

message DeleteCredentialResponse {}
