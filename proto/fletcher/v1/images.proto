syntax = "proto3";

package fletcher.v1;

option go_package = "github.com/joshjon/fletcher/internal/gen/proto/fletcher/v1;fletcherv1";

// ImageService manages rootfs templates on the daemon's host, so a remote client
// (e.g. a laptop) can import an image without local docker or access to the
// daemon's snapshot filesystem. The daemon pulls and flattens the image itself.
service ImageService {
  // Import pulls a Docker image from a registry and flattens it into a template
  // the daemon's runtime can boot. Reachable remotely, gated by the per-peer
  // token. Building from a local Dockerfile stays a host-side operation (it
  // needs the working directory); this covers the "deploy a registry image"
  // path that works from anywhere.
  rpc Import(ImportRequest) returns (ImportResponse) {}
  // ListImages lists the imported templates, so a client can offer an image
  // picker instead of a free-text field.
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse) {}
  // BuildFromSession builds a project's Dockerfile - living in a running
  // session's workspace - into a deployable template, entirely inside Fletcher
  // (M19): the daemon tars the project out of the session and builds it with
  // buildah in an ephemeral, sandboxed build fork (no host Docker). Blocks for
  // the whole build - used by the CLI `deploy`, where blocking is fine.
  rpc BuildFromSession(BuildFromSessionRequest) returns (BuildFromSessionResponse) {}
  // StartBuildFromSession kicks off the same build but runs it DETACHED from the
  // request and returns a build id immediately, so a mobile client can poll
  // GetBuildStatus and survive being backgrounded mid-build (a build can take
  // minutes). The build keeps running even if this call's connection drops.
  rpc StartBuildFromSession(StartBuildFromSessionRequest) returns (StartBuildFromSessionResponse) {}
  // GetBuildStatus reports a detached build's current state (building / succeeded
  // / failed) so a client can poll to completion and recover after a reconnect.
  rpc GetBuildStatus(GetBuildStatusRequest) returns (GetBuildStatusResponse) {}
}

message BuildFromSessionRequest {
  // dev_session_ref is the session (id or name) holding the project to build.
  string dev_session_ref = 1;
  // subdir is the project directory inside the session whose Dockerfile to
  // build (e.g. "/workspace/myapp"); empty/"." builds the session's cwd root.
  string subdir = 2;
  // name is the template name to import the built image as.
  string name = 3;
  // force replaces an existing template of the same name.
  bool force = 4;
}

message BuildFromSessionResponse {
  string name = 1;
  // exposed_port is the built image's lowest EXPOSE (0 if none), a default for
  // what to publish.
  uint32 exposed_port = 2;
}

// StartBuildFromSessionRequest mirrors BuildFromSessionRequest; a distinct type
// is required because the two RPCs cannot share a request message.
message StartBuildFromSessionRequest {
  string dev_session_ref = 1;
  string subdir = 2;
  string name = 3;
  bool force = 4;
}

message StartBuildFromSessionResponse {
  // build_id identifies the detached build; poll GetBuildStatus with it.
  string build_id = 1;
}

message GetBuildStatusRequest {
  string build_id = 1;
}

message GetBuildStatusResponse {
  // state is "building", "succeeded", or "failed". An unknown build_id (e.g. the
  // daemon restarted) is reported as "failed" with an error.
  string state = 1;
  // name + exposed_port are set when state is "succeeded".
  string name = 2;
  uint32 exposed_port = 3;
  // error is set when state is "failed".
  string error = 4;
}

message ListImagesRequest {}
message ListImagesResponse {
  repeated Image images = 1;
}

message Image {
  // name is the template name (jobs/sessions reference it via --image).
  string name = 1;
  // format is "ext4" or "subvolume".
  string format = 2;
  // source is the registry ref it was imported from (empty for older imports).
  string source = 3;
  // digest is the image digest ("sha256:..."), empty for a local-only image.
  string digest = 4;
  // imported_at is when it was imported (Unix epoch seconds; 0 if unknown).
  int64 imported_at = 5;
  // exposed_port is the image's lowest EXPOSE (0 if it declares none).
  uint32 exposed_port = 6;
  // entrypoint is the image's effective launch command (ENTRYPOINT + CMD).
  repeated string entrypoint = 7;
}

message ImportRequest {
  // ref is the Docker image reference to pull (e.g. ghcr.io/you/app:v1).
  string ref = 1;
  // name is the template name (jobs/sessions reference it via --image); empty
  // defaults to the ref's repository name.
  string name = 2;
  // registry_username / registry_password authenticate to a private registry;
  // empty uses the host's default docker credentials, if any.
  string registry_username = 3;
  string registry_password = 4;
  // force replaces an existing template of the same name.
  bool force = 5;
}

message ImportResponse {
  string name = 1;
  // digest is the pulled image's digest ("sha256:...").
  string digest = 2;
  // exposed_port is the image's lowest EXPOSE (0 if it declares none), a default
  // for what to publish.
  uint32 exposed_port = 3;
}
