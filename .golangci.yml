version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - errcheck
    - errorlint
    - funlen
    - gocognit
    - gocritic
    - gosec
    - govet
    - misspell
    - nilerr
    - nolintlint
    - noctx
    - prealloc
    - revive
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unparam
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        # Output-rendering helpers write to buffered/tab writers where the
        # error path is practically unreachable; the final Flush is checked.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    funlen:
      lines: 100
      statements: 50
    gocognit:
      min-complexity: 30
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
          disabled: false
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - funlen
          - gocognit
          - gosec
          - noctx
      - path: cmd/
        linters:
          - funlen

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/joshjon/fletcher
