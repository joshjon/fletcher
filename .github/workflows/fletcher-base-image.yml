# Builds the fletcher-base agent image and publishes it to GitHub Container
# Registry (ghcr.io/<owner>/fletcher-base), so operators can pull a ready-made
# base instead of running `make image` locally.
#
# `fletcher image import ghcr.io/<owner>/fletcher-base:debian-13 --format ext4`
# pulls it via docker. The image must be public (or the host must `docker login
# ghcr.io`); package visibility is set once in the repo's package settings.
name: fletcher-base image

on:
  # Manual trigger so a base image can be published on demand.
  workflow_dispatch:
  # Rebuild when the image definition changes on the default branch.
  push:
    branches: [main]
    paths:
      - images/fletcher-base/**
      - .github/workflows/fletcher-base-image.yml
  # Publish a versioned image alongside release tags.
  release:
    types: [published]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/fletcher-base

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # The image is a Debian 13 base; tag it by variant, keep latest on the
          # default branch, add a sha tag, and a semver tag on releases.
          tags: |
            type=raw,value=debian-13
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/fletcher-base
          # amd64 only for now: the heavy agent image is slow to build for
          # arm64 under QEMU emulation. Add linux/arm64 once a native arm
          # runner (or a tolerable build time) is available.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
