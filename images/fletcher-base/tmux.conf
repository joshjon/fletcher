# Fletcher durable shell config.
#
# tmux here is an invisible wrapper, not a visible UI: the guest's runShell
# attaches every interactive shell to one persistent tmux session per VM so the
# REPL (and any agent in it) survives a client detach - backgrounding the app,
# navigating away, a dropped tunnel. Keep it transparent.

# No status bar - the client renders a plain terminal, not a tmux UI.
set -g status off

# Generous scrollback for the durable session.
set -g history-limit 50000

# Snappy ESC for vim / agent TUIs (no meta-key ambiguity over the link).
set -g escape-time 10

# Enable mouse. This is the plain, standard tmux setup a normal SSH terminal
# (e.g. Termius) uses to scroll a tmux session: the client forwards the wheel to
# tmux, and tmux scrolls its own 50k-line history (copy-mode), auto-returning to
# the prompt when you scroll back to the bottom. We deliberately do NOT override
# the default wheel bindings or advertise SGR mouse (tmux-256color): an earlier
# attempt to hand the wheel to the agent broke scrolling, because the agent does
# not scroll on the wheel - it relies on the terminal's scrollback, which under
# tmux is tmux's own. screen-256color keeps agent TUIs from grabbing the mouse,
# so the wheel reliably drives tmux scrollback. It also ships in ncurses-base.
set -g mouse on
set -g default-terminal "screen-256color"
