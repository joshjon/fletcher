version: 2

project_name: fletcher

before:
  hooks:
    # Make sure generated code is in sync with sources before cutting a
    # release; goreleaser refuses to proceed if generate-check would fail.
    - make generate-check
    # Bundle the Firecracker runtime into the release binary. These assets are
    # gitignored and arch-specific, so they must be fetched/built for every
    # release arch before goreleaser compiles - otherwise the binary embeds
    # nothing, vmm.Available() is false, and the daemon silently falls back to
    # mock instead of Firecracker. fetch-vmm pulls both arches; build-guest-all
    # builds the guest init for both.
    - make fetch-vmm
    - make build-guest-all

builds:
  - id: fletcher
    main: ./cmd/fletcher
    binary: fletcher
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/joshjon/fletcher/internal/buildinfo.Version={{ .Version }}
      - -X github.com/joshjon/fletcher/internal/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/joshjon/fletcher/internal/buildinfo.Date={{ .CommitDate }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # The Firecracker VMM, guest kernel, and guest agent are behind //go:build
    # linux embed stubs, so the darwin binaries carry none of them and ship slim
    # as a pure client (the daemon is Linux-only).
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: fletcher
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - DESIGN.md
      - STANDARDS.md
      - init/fletcher.service
      - scripts/install.sh

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

# Homebrew is the idiomatic macOS install for the client (casks are macOS-only,
# so this targets the darwin artifacts). It installs just the binary - a Mac
# connects to a Linux daemon via `fletcher login`. Requires a tap repo
# (joshjon/homebrew-tap) and a token with write access; goreleaser pushes the
# cask there on release.
homebrew_casks:
  - name: fletcher
    repository:
      owner: joshjon
      name: homebrew-tap
    homepage: "https://github.com/joshjon/fletcher"
    description: "Private agent compute on hardware you own (Linux daemon + cross-platform client)"
    caveats: |
      Installed the fletcher client. Connect it to your Linux daemon with:
        fletcher login <token>   (from `fletcher peer pair` on the server)

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^style:"
  groups:
    - title: Features
      regexp: '^feat(\([^)]*\))?:'
      order: 0
    - title: Bug fixes
      regexp: '^fix(\([^)]*\))?:'
      order: 1
    - title: Refactors
      regexp: '^refactor(\([^)]*\))?:'
      order: 2
    - title: Build / CI
      regexp: '^(build|ci)(\([^)]*\))?:'
      order: 3

release:
  github:
    owner: joshjon
    name: fletcher
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Version }}"
  header: |
    Fletcher {{ .Version }}.
    See `README.md` for install instructions.
